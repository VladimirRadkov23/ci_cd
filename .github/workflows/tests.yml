name: Reusable Workflow
on:
  workflow_call:     # запускается другим workflow

jobs:
  console-log:
    runs-on: ubuntu-latest
    steps:
      - name: Print Title
        run: echo 'test Asd'
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install requirements
        run: pip install -r requirements.txt
      - name: new Title
        run: echo 'new Asd'